kind = "web"
previewPath = "/"
title = "NAWIS AI"
version = "1.0.0"
id = "artifacts/nawis-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18612

[services.development]
run = "pnpm --filter @workspace/nawis-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nawis-ai", "run", "build" ]
publicDir = "artifacts/nawis-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18612"
BASE_PATH = "/"
