kind = "web"
previewPath = "/"
title = "NAWIS AI"
version = "1.0.0"
id = "artifacts/nawis-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18612

[services.development]
run = "bash -c 'cd /home/runner/workspace/artifacts/nawis-ai && pip install -q -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port $PORT --reload'"

[services.env]
PORT = "18612"
